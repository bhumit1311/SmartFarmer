{% extends 'base.html' %}
{% block title %}Smart Farmer Assistant - Reset Password{% endblock %}

{% block content %}
<section class="py-5 my-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="premium-card shadow-lg p-4 p-md-5 border bg-white text-center">
                    <div class="card-icon-container mx-auto">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h2 class="fw-bold mt-3">Reset Password</h2>
                    <p class="text-muted mb-4">Enter your registered email address, and we'll show a reset link in the console.</p>
                    
                    <form method="POST" action="">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label for="id_email" class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" name="email" id="id_email" class="form-control form-control-custom border-start-0 ps-0" placeholder="john@example.com" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-premium w-100 py-3">Send Reset Request <i class="bi bi-arrow-right-short ms-1"></i></button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" class="text-success fw-bold text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
