{% extends 'base.html' %}
{% block title %}Smart Farmer Assistant - Reset Complete{% endblock %}

{% block content %}
<section class="py-5 my-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="premium-card shadow-lg p-4 p-md-5 border bg-white text-center">
                    <div class="card-icon-container mx-auto bg-success bg-opacity-15">
                        <i class="bi bi-shield-fill-check text-success" style="font-size: 2rem;"></i>
                    </div>
                    <h2 class="fw-bold mt-3">Reset Successful</h2>
                    <p class="text-muted mb-4">Your password has been successfully reset! You can now log into your account using your new credentials.</p>
                    
                    <a href="{% url 'login' %}" class="btn btn-premium w-100 py-3">Log In Now <i class="bi bi-box-arrow-in-right ms-1"></i></a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
